[build]
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.stripe.com https://*.stripe.network; connect-src 'self' https://*.stripe.com https://api.stripe.com https://connect.stripe.com https://*.supabase.co wss://*.supabase.co; frame-src 'self' https://*.stripe.com https://connect.stripe.com; img-src 'self' data: blob: https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; worker-src 'self' blob:;"
